<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fast Task Manager — {{ page_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="/static/css/base.css?v=1.0.8" rel="stylesheet" />
</head>

<body>
    <div class="app">

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-mark">
                    <svg viewBox="0 0 18 18" fill="none">
                        <rect x="2" y="2" width="6" height="6" rx="1.5" fill="#0f0f10" />
                        <rect x="10" y="2" width="6" height="6" rx="1.5" fill="#0f0f10" />
                        <rect x="2" y="10" width="6" height="6" rx="1.5" fill="#0f0f10" />
                        <rect x="10" y="12" width="6" height="2" rx="1" fill="#0f0f10" />
                        <rect x="13" y="9" width="2" height="6" rx="1" fill="#0f0f10" transform="rotate(0 13 9)" />
                    </svg>
                </div>
                <span class="logo-text">Fast Task<span> Manager</span></span>
            </div>

            <nav class="sidebar-nav">
                <span class="sidebar-section-label">Principal</span>

                <a class="nav-item {% if page == 'dashboard' %}active{% endif %}" href="/dashboard">
                    <span class="nav-icon"><svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="5" height="5" rx="1.2" />
                            <rect x="11" y="2" width="5" height="5" rx="1.2" />
                            <rect x="2" y="11" width="5" height="5" rx="1.2" />
                            <rect x="11" y="11" width="5" height="5" rx="1.2" />
                        </svg></span>
                    <span class="nav-label">Dashboard</span>
                </a>

                <a class="nav-item {% if page == 'tasks' %}active{% endif %}" href="/tasks">
                    <span class="nav-icon"><svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M6 4h9M6 9h9M6 14h9" />
                            <circle cx="3" cy="4" r="1" />
                            <circle cx="3" cy="9" r="1" />
                            <circle cx="3" cy="14" r="1" />
                        </svg></span>
                    <span class="nav-label">Tarefas</span>
                </a>

                <a class="nav-item {% if page == 'projects' %}active{% endif %}" href="/projects">
                    <span class="nav-icon"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="6" y="10" width="36" height="28" rx="3" />
                            <path d="M6 18h36M16 10v8M32 10v8" />
                            <path d="M14 26h8M14 32h14" />
                        </svg></span>
                    <span class="nav-label">Projetos</span>
                </a>

                <a class="nav-item {% if page == 'calendar' %}active{% endif %}" href="/calendar">
                    <span class="nav-icon"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="6" y="8" width="36" height="34" rx="3" />
                            <path d="M6 18h36M16 8v4M32 8v4" />
                            <rect x="12" y="24" width="6" height="6" rx="1" />
                            <rect x="21" y="24" width="6" height="6" rx="1" />
                            <rect x="30" y="24" width="6" height="6" rx="1" />
                        </svg></span>
                    <span class="nav-label">Calendario</span>
                </a>

            </nav>

            <div class="sidebar-footer">
                <div class="user-card" id="userMenuTrigger">
                    <div class="avatar">{{ username[:1] | upper }}</div>
                    <div class="user-info">
                        <div class="user-name">{{ username }}</div>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="user-chevron">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>

                <div class="user-dropdown" id="userDropdown">
                    <a href="/signout" class="dropdown-item logout-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Sair da Conta
                    </a>
                </div>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <div class="topbar-left">
                    <h1 id="pageTitle">{{ page_title }}</h1>
                    <p id="pageDate"></p>
                </div>
            </header>
            <div class="content">

                {% block content %}
                {% endblock %}
            </div>

        </main>
    </div>
    <div class="modal-overlay" id="modal-custom-confirm" style="display: none; z-index: 9999;">
        <div class="modal-content" style="max-width: 400px; text-align: center; padding: 30px;">

            <svg viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" style="width: 48px; height: 48px; margin-bottom: 15px;">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>

            <h3 style="margin-bottom: 10px;">Atenção</h3>
            <p id="confirm-message" style="color: var(--muted); margin-bottom: 25px;">Tem certeza que deseja realizar
                esta ação?</p>

            <div class="modal-actions" style="justify-content: center; gap: 15px;">
                <button type="button" class="btn-cancel" id="btn-cancel-confirm">Cancelar</button>
                <button type="button" class="btn-delete-project" id="btn-accept-confirm">Sim, apagar</button>
            </div>
        </div>
    </div>
    <script src="/static/js/script.js?v=1.0.1"></script>
</body>

</html>
